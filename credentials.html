<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Credentials</title>
<style>
body { font-family: Arial, sans-serif; background:#0a1430; color:white; padding:2rem; }
.credential-card {
  border: 1px solid rgba(133,167,255,0.2);
  border-radius: 16px;
  padding: 1rem;
  background:#0f1d3c;
  max-width: 400px;
}
.credential-link {
  text-decoration: none;
  color: inherit;
  display: block;
}
.credential-link:hover {
  transform: translateY(-2px);
  opacity: 0.95;
}
</style>
</head>
<body>

<div class="credential-card">
  <a href="https://www.linkedin.com/in/austin-emery87/details/honors/" target="_blank" rel="noreferrer" class="credential-link">
    <h3>Navy and Marine Corps Achievement Medal</h3>
    <p>
      Awarded for outstanding performance, leadership, and technical contributions
      while serving in the U.S. Navy.
    </p>
  </a>
</div>

</body>
</html>
