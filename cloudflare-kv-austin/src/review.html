<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloudflare KV Austin</title>
</head>
<body>
    <h1>Welcome to Cloudflare KV Austin</h1>

    <!-- Form for reviewing submissions -->
    <h2>Review Submissions</h2>
    <form action="/review" method="post">
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" required><br><br>
        <button type="submit">Review</button>
    </form>

    <!-- Placeholder for dynamic content -->
    <div id="reviewContent"></div>

    <script>
        // Function to handle the review form submission
        document.querySelector('form[action="/review"]').addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const formData = new FormData();
            formData.append('password', password);

            try {
                const response = await fetch('/review', {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    const result = await response.text();
                    document.getElementById('reviewContent').innerHTML = result;
                } else {
                    document.getElementById('reviewContent').innerHTML = `Error: ${response.statusText}`;
                }
            } catch (error) {
                document.getElementById('reviewContent').innerHTML = `Error: ${error.message}`;
            }
        });

        // Function to handle clicking on timestamps
        document.addEventListener('click', async (e) => {
            if (e.target.tagName === 'A' && e.target.href.startsWith(window.location.origin + '/review/')) {
                e.preventDefault();
                const timestamp = e.target.href.split('/').pop();

                try {
                    const response = await fetch(`/review/${timestamp}`);
                    if (response.ok) {
                        const result = await response.text();
                        document.getElementById('reviewContent').innerHTML = result;
                    } else {
                        document.getElementById('reviewContent').innerHTML = `Error: ${response.statusText}`;
                    }
                } catch (error) {
                    document.getElementById('reviewContent').innerHTML = `Error: ${error.message}`;
                }
            }
        });
    </script>
</body>
</html>
