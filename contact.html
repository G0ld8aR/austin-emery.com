<section class="contact-grid">
  <div class="contact-card">

    </p>

    <div class="contact-links">

        <svg viewBox="0 0 24 24">

    </div>
  </div>

  <div class="contact-card">
    <p class="eyebrow">MESSAGE DRAFT</p>
    <h2>Write something clean and copy it fast</h2>

    <form id="contactForm" class="draft-form">
      <div class="row">
        <label>
          <span>Name</span>
          <input id="name" name="name" type="text" placeholder="Your name" required />
        </label>

        <label>
          <span>Email</span>
          <input id="email" name="email" type="email" placeholder="you@example.com" required />
        </label>
      </div>

      <label>
        <span>Subject</span>
        <input id="subject" name="subject" type="text" placeholder="What are you reaching out about?" required />
      </label>

      <label>
        <span>Message</span>
        <textarea id="message" name="message" rows="8" placeholder="Write your message here" required></textarea>
      </label>

      <div class="actions">
        <button id="emailBtn" type="submit" class="primary-btn" disabled>Email me</button>
        <button type="reset" class="secondary-btn">Clear</button>
      </div>
    </form>
  </div>
</section>

<style>
  .contact-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(320px, 1fr));
    gap: 1rem;
  }

  .contact-card {
    border: 1px solid rgba(133, 167, 255, 0.2);
    border-radius: 24px;
    padding: 1.25rem;
    background:
      radial-gradient(circle at top left, rgba(34, 77, 160, 0.18), transparent 32%),
      linear-gradient(180deg, #0f1d3c 0%, #0a1430 100%);
    color: #f4f7ff;
  }

  .back-link {
    display: inline-block;
    margin-bottom: 1rem;
    color: #b6ccff;
    text-decoration: none;
  }

  .eyebrow {
    margin: 0 0 0.75rem;
    font-size: 0.8rem;
    letter-spacing: 0.18em;
    color: #d6e3ff;
  }

  .contact-card h1,
  .contact-card h2 {
    margin: 0 0 1rem;
    font-size: clamp(2rem, 3vw, 3.1rem);
  }

  .contact-copy {
    color: #edf3ff;
    margin-bottom: 1.4rem;
  }

  .contact-links {
    display: flex;
    gap: 0.85rem;
  }

  .icon-link {
    width: 58px;
    height: 58px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    border: 1px solid rgba(135, 170, 255, 0.28);
  }

  .icon-link svg {
    width: 24px;
    height: 24px;
    fill: #fff;
  }

  .draft-form {
    display: grid;
    gap: 1rem;
  }

  .row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.9rem;
  }

  input, textarea {
    width: 100%;
    padding: 0.8rem;
    border-radius: 10px;
    border: none;
    background: #09142d;
    color: white;
  }

  .actions {
    display: flex;
    gap: 0.9rem;
  }

  .primary-btn {
    background: #5c6470;
    color: white;
    border-radius: 999px;
    padding: 0.8rem 1.2rem;
    border: none;
  }

  .primary-btn:disabled {
    opacity: 0.7;
  }

  .secondary-btn {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.2);
    color: white;
    border-radius: 999px;
    padding: 0.8rem 1.2rem;
  }
</style>

<script>
  const form = document.getElementById("contactForm");
  const btn = document.getElementById("emailBtn");
  const fields = form.querySelectorAll("input, textarea");

  function checkForm() {
    const valid = [...fields].every(f => f.value.trim() !== "");
    btn.disabled = !valid;
  }

  fields.forEach(f => f.addEventListener("input", checkForm));

  form.addEventListener("submit", (e) => {
    e.preventDefault();

    const subject = encodeURIComponent(document.getElementById("subject").value);
    const body = encodeURIComponent(
      "Name: " + document.getElementById("name").value + "\n" +
      "Email: " + document.getElementById("email").value + "\n\n" +
      document.getElementById("message").value
    );

    window.location.href = `mailto:afemery87@gmail.com?subject=${subject}&body=${body}`;
  });
</script>
