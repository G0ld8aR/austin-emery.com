<style>
  .contact-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(320px, 1fr));
    gap: 1rem;
  }

  .contact-card {
    border: 1px solid rgba(133, 167, 255, 0.2);
    border-radius: 24px;
    padding: 1.25rem;
    background:
      radial-gradient(circle at top left, rgba(34, 77, 160, 0.18), transparent 32%),
      linear-gradient(180deg, #0f1d3c 0%, #0a1430 100%);
    color: #f4f7ff;
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
  }

  .back-link {
    display: inline-block;
    margin-bottom: 1rem;
    color: #b6ccff;
    text-decoration: none;
  }

  .eyebrow {
    margin: 0 0 0.75rem;
    font-size: 0.8rem;
    letter-spacing: 0.18em;
    color: #d6e3ff;
  }

  .contact-card h1,
  .contact-card h2 {
    margin: 0 0 1rem;
    line-height: 1.05;
    font-size: clamp(2rem, 3vw, 3.1rem);
  }

  .contact-copy {
    max-width: 36rem;
    color: #edf3ff;
    line-height: 1.7;
    margin-bottom: 1.4rem;
  }

  .contact-links {
    display: flex;
    gap: 0.85rem;
    flex-wrap: wrap;
  }

  .icon-link {
    width: 58px;
    height: 58px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: 999px;
    border: 1px solid rgba(135, 170, 255, 0.28);
    background: linear-gradient(180deg, rgba(33, 61, 118, 0.9), rgba(21, 35, 70, 0.95));
    text-decoration: none;
    transition: transform 0.2s ease, border-color 0.2s ease, background 0.2s ease;
  }

  .icon-link:hover {
    transform: translateY(-1px);
    border-color: rgba(173, 199, 255, 0.5);
    background: linear-gradient(180deg, rgba(42, 75, 145, 0.95), rgba(24, 41, 81, 0.98));
  }

  .icon-link svg {
    width: 24px;
    height: 24px;
    fill: #ffffff;
  }

  .draft-form {
    display: grid;
    gap: 1rem;
  }

  .row {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 0.9rem;
  }

  .draft-form label {
    display: grid;
    gap: 0.45rem;
  }

  .draft-form span {
    font-weight: 700;
    color: #f0f5ff;
  }

  .draft-form input,
  .draft-form textarea {
    width: 100%;
    border-radius: 16px;
    border: 1px solid rgba(135, 170, 255, 0.18);
    background: #09142d;
    color: #f4f7ff;
    padding: 0.95rem 1rem;
    outline: none;
  }

  .draft-form input::placeholder,
  .draft-form textarea::placeholder {
    color: #92addf;
  }

  .draft-form input:focus,
  .draft-form textarea:focus {
    border-color: rgba(156, 190, 255, 0.45);
  }

  .actions {
    display: flex;
    gap: 0.9rem;
    flex-wrap: wrap;
  }

  .primary-btn,
  .secondary-btn {
    min-width: 140px;
    padding: 0.95rem 1.2rem;
    border-radius: 999px;
    border: 1px solid rgba(135, 170, 255, 0.22);
    font-weight: 700;
    cursor: pointer;
  }

  .primary-btn {
    background: linear-gradient(180deg, #355f9f, #2b4f87);
    color: #fff;
  }

  .primary-btn:disabled {
    background: #5c6470;
    color: rgba(255, 255, 255, 0.72);
    border-color: rgba(255, 255, 255, 0.08);
    cursor: not-allowed;
    opacity: 0.8;
  }

  .secondary-btn {
    background: rgba(255, 255, 255, 0.04);
    color: #fff;
  }

  @media (max-width: 900px) {
    .contact-grid,
    .row {
      grid-template-columns: 1fr;
    }
  }
</style>

<script>
  const form = document.getElementById("contactForm");
  const emailBtn = document.getElementById("emailBtn");
  const requiredFields = [...form.querySelectorAll("input[required], textarea[required]")];

  const updateButtonState = () => {
    const allFilled = requiredFields.every((field) => field.value.trim() !== "");
    const emailValid = document.getElementById("email").checkValidity();
    emailBtn.disabled = !(allFilled && emailValid);
  };

  requiredFields.forEach((field) => {
    field.addEventListener("input", updateButtonState);
    field.addEventListener("change", updateButtonState);
  });

  form.addEventListener("reset", () => {
    setTimeout(updateButtonState, 0);
  });

  form.addEventListener("submit", (e) => {
    e.preventDefault();

    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    const subject = document.getElementById("subject").value.trim();
    const message = document.getElementById("message").value.trim();

    const body = [
      `Name: ${name}`,
      `Email: ${email}`,
      ``,
      message
    ].join("\n");

    window.location.href =
      `mailto:afemery87@gmail.com?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
  });

  updateButtonState();
</script>
